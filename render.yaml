# Render Blueprint for Global Pulse
# Docs: https://render.com/docs/blueprint-spec
#
# Deploys the app as a Node web service with a persistent disk so that
# community submissions (server data) survive deploys and restarts.
services:
  - type: web
    name: global-pulse
    runtime: node
    # Persistent disks require a paid instance type (Free does not support them).
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Where the app writes data.json — must match the disk mountPath below.
      - key: DATA_DIR
        value: /var/data
      # Admin password that unlocks the continent-focus control.
      # Set this in the Render dashboard (kept out of source control).
      - key: ADMIN_PASSWORD
        sync: false
      # Secret used to sign admin session cookies. Render generates a strong
      # value and keeps it stable across deploys (sessions survive restarts).
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: global-pulse-data
      mountPath: /var/data
      sizeGB: 1
