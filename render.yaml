# Render Blueprint for Global Pulse
# Docs: https://render.com/docs/blueprint-spec
#
# Deploys a Node web service backed by a managed PostgreSQL database, so all
# community submissions are stored durably and survive deploys and restarts.
databases:
  - name: global-pulse-db
    databaseName: global_pulse
    user: global_pulse
    plan: basic-256mb
    region: oregon

services:
  - type: web
    name: global-pulse
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Postgres connection string, injected from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: global-pulse-db
          property: connectionString
      # Secret used to sign session cookies. Render generates a strong value
      # and keeps it stable across deploys (sessions survive restarts).
      - key: SESSION_SECRET
        generateValue: true
